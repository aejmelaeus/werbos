<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Werbos Component - Brand System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="ds-preview-page">
      <header class="ds-header">
        <div class="brand-lockup">
          <img src="../brand/pwa-icon.svg" alt="Werbos icon" class="logo-mark" />
          <div>
            <p class="eyebrow">Brand system</p>
            <p class="muted">Speech coach proposal</p>
          </div>
        </div>
        <a class="component-link" href="../index.html">Back</a>
      </header>

      <article class="card brand-card">
        <div class="brand-showcase">
          <div class="brand-primary">
            <img src="../brand/logo.svg" alt="Werbos speech coach logo" class="brand-logo" />
            <p class="muted">Primary logo for app navigation, with the speech bubble reserved for Zorrito guidance.</p>
          </div>
          <div class="brand-assets">
            <div class="brand-asset">
              <img src="../brand/pwa-icon.svg" alt="Werbos PWA icon" />
              <span>PWA icon source</span>
            </div>
            <div class="brand-asset">
              <img src="../brand/zorrito.svg" alt="Zorrito mascot" />
              <span>Mascot source</span>
            </div>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
